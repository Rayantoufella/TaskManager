<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F0FDF4;color:#064E3B;-webkit-font-smoothing:antialiased}
:root{
  --emerald:#10B981;--teal:#14B8A6;--violet:#A855F7;--mint:#6EE7B7;
  --bg:#F0FDF4;--card:#FFFFFF;--border:#D1FAE5;
  --text:#064E3B;--text2:#6B7280;--text3:#9CA3AF;
  --todo-bg:#E0F2FE;--todo-color:#0EA5E9;
  --inprogress-bg:#FEF3C7;--inprogress-color:#F59E0B;
  --done-bg:#D1FAE5;--done-color:#10B981;
  --late-bg:#FEE2E2;--late-color:#EF4444;
  --grad:linear-gradient(135deg,#10B981,#14B8A6);
  --grad-accent:linear-gradient(135deg,#A855F7,#C084FC);
  --shadow:0 4px 20px rgba(16,185,129,0.08),0 1px 4px rgba(16,185,129,0.06);
  --shadow-hover:0 8px 32px rgba(16,185,129,0.18),0 2px 8px rgba(16,185,129,0.1);
  --radius:16px;
}
input,textarea,select{font-family:'Inter',sans-serif}
button{cursor:pointer;font-family:'Inter',sans-serif}
.screen-label{
  display:flex;align-items:center;gap:12px;padding:32px 0 16px;
  font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  color:#9CA3AF;user-select:none;
}
.screen-label::before,.screen-label::after{content:'';flex:1;height:1px;background:#D1FAE5}
.screen-sep{height:40px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.fade-in{animation:fadeInUp .3s ease both}
</style>

<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── TOKENS ──
const C = {
  emerald:'#10B981',teal:'#14B8A6',violet:'#A855F7',mint:'#6EE7B7',
  bg:'#F0FDF4',card:'#FFFFFF',border:'#D1FAE5',
  text:'#064E3B',text2:'#6B7280',text3:'#9CA3AF',
  todoBg:'#E0F2FE',todoColor:'#0EA5E9',
  inBg:'#FEF3C7',inColor:'#F59E0B',
  doneBg:'#D1FAE5',doneColor:'#10B981',
  lateBg:'#FEE2E2',lateColor:'#EF4444',
  pinkBg:'#FCE7F3',pink:'#F472B6',
  cyanBg:'#CFFAFE',cyan:'#06B6D4',
  violetBg:'#F3E8FF',
  roseBg:'#FFE4E6',rose:'#F43F5E',
};
const GRAD = 'linear-gradient(135deg,#10B981,#14B8A6)';
const GRAD_ACCENT = 'linear-gradient(135deg,#A855F7,#C084FC)';
const SHADOW = '0 4px 20px rgba(16,185,129,0.10),0 1px 4px rgba(16,185,129,0.06)';
const SHADOW_HOVER = '0 8px 32px rgba(16,185,129,0.20),0 2px 8px rgba(16,185,129,0.12)';
const R = '16px';

const CATS = {
  'Travail':   {bg:'#CCFBF1',color:'#14B8A6'},
  'Personnel': {bg:'#FCE7F3',color:'#F472B6'},
  'Urgent':    {bg:'#FFE4E6',color:'#F43F5E'},
  'Idées':     {bg:'#CFFAFE',color:'#06B6D4'},
  'Apprentissage':{bg:'#F3E8FF',color:'#A855F7'},
};

const STATUS = {
  'À faire':  {bg:C.todoBg,color:C.todoColor,label:'À faire'},
  'En cours': {bg:C.inBg,  color:C.inColor,  label:'En cours'},
  'Terminé':  {bg:C.doneBg,color:C.doneColor, label:'Terminé'},
  'En retard':{bg:C.lateBg,color:C.lateColor, label:'En retard'},
};

const INITIAL_TASKS = [
  {id:1,title:'Préparer la présentation Q2',desc:"Slides pour le board meeting du vendredi. Inclure les métriques de croissance et les projections annuelles.",cat:'Travail',status:'En cours',due:'2026-04-28',created:'2026-04-15'},
  {id:2,title:'Réviser le contrat fournisseur',desc:"Analyser les clauses de renouvellement et négocier les tarifs avec l'équipe juridique.",cat:'Urgent',status:'En retard',due:'2026-04-20',created:'2026-04-10'},
  {id:3,title:'Formation React avancé',desc:"Suivre le module sur les hooks personnalisés et les patterns de performance sur Udemy.",cat:'Apprentissage',status:'À faire',due:'2026-05-10',created:'2026-04-18'},
  {id:4,title:'Débrief sprint 14',desc:"Réunion rétrospective avec l'équipe produit. Identifier les points d'amélioration et célébrer les succès.",cat:'Travail',status:'Terminé',due:'2026-04-22',created:'2026-04-08'},
  {id:5,title:'Réserver billets conférence UX',desc:"Paris Design Week — enregistrer avant la date limite pour le tarif early bird.",cat:'Personnel',status:'À faire',due:'2026-05-05',created:'2026-04-20'},
  {id:6,title:'Rédiger les user stories',desc:"Epic onboarding V2 — décomposer en stories INVEST et estimer la vélocité.",cat:'Idées',status:'En cours',due:'2026-04-30',created:'2026-04-17'},
  {id:7,title:'Mise à jour documentation API',desc:"Documenter les nouveaux endpoints REST et mettre à jour Swagger avec les exemples de réponses.",cat:'Travail',status:'À faire',due:'2026-05-02',created:'2026-04-21'},
];

// ── SHARED COMPONENTS ──
const Logo = ({size=28}) => (
  <span style={{fontSize:size,fontWeight:800,background:GRAD,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-0.03em'}}>
    TaskFlow
  </span>
);

const Btn = ({children,variant='primary',onClick,type='button',style={},...p}) => {
  const [hov,setHov]=useState(false);
  const base={
    display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,
    border:'none',borderRadius:12,fontWeight:600,fontSize:14,cursor:'pointer',
    transition:'all .2s ease',outline:'none',
  };
  const variants={
    primary:{background:GRAD,color:'#fff',padding:'12px 24px',
      boxShadow:hov?'0 0 24px rgba(16,185,129,0.45)':'0 0 12px rgba(16,185,129,0.25)',
      transform:hov?'translateY(-1px)':'none'},
    accent:{background:GRAD_ACCENT,color:'#fff',padding:'12px 24px',
      boxShadow:hov?'0 0 24px rgba(168,85,247,0.4)':'0 0 10px rgba(168,85,247,0.2)',
      transform:hov?'translateY(-1px)':'none'},
    ghost:{background:hov?'#F3F4F6':'transparent',color:C.text2,padding:'12px 24px',
      border:`1.5px solid #E5E7EB`},
    danger:{background:hov?'#DC2626':'#EF4444',color:'#fff',padding:'12px 24px',
      transform:hov?'translateY(-1px)':'none'},
    outline:{background:'transparent',color:C.emerald,padding:'12px 24px',
      border:`1.5px solid ${C.emerald}`},
  };
  return <button type={type} style={{...base,...variants[variant],...style}}
    onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    onClick={onClick} {...p}>{children}</button>;
};

const Input = ({label,type='text',value,onChange,placeholder,icon,...p}) => (
  <div style={{display:'flex',flexDirection:'column',gap:6}}>
    {label && <label style={{fontSize:13,fontWeight:600,color:C.text}}>{label}</label>}
    <div style={{position:'relative'}}>
      {icon && <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:C.text3,fontSize:16}}>{icon}</span>}
      <input type={type} value={value} onChange={onChange} placeholder={placeholder}
        style={{width:'100%',padding:icon?'12px 14px 12px 42px':'12px 14px',border:`1.5px solid ${C.border}`,
          borderRadius:12,fontSize:14,color:C.text,background:'#fff',outline:'none',
          transition:'border-color .2s',fontFamily:'Inter',...p.style}}
        onFocus={e=>e.target.style.borderColor=C.emerald}
        onBlur={e=>e.target.style.borderColor=C.border}
        {...p}/>
    </div>
  </div>
);

  const s=STATUS[status]||STATUS['À faire'];
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 10px',
    borderRadius:999,fontSize:11,fontWeight:700,background:s.bg,color:s.color,whiteSpace:'nowrap'}}>
    <span style={{width:6,height:6,borderRadius:'50%',background:s.color,display:'inline-block'}}></span>
    {s.label}
  </span>;
};

const CatBadge = ({cat}) => {
  const c=CATS[cat]||CATS['Travail'];
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',
    borderRadius:999,fontSize:11,fontWeight:600,background:c.bg,color:c.color}}>

    bell:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,

    check:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,

const DashboardScreen = ({tasks,onNavigate,onNewTask}) => {

  const stats={
    total:tasks.length,
    todo:tasks.filter(t=>t.status==='À faire').length,
    inprogress:tasks.filter(t=>t.status==='En cours').length,

    late:tasks.filter(t=>t.status==='En retard').length,

const StatCard = ({label,value,icon,color,bg,trend,progress,grad}) => {
  const [hov,setHov]=useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:'#fff',borderRadius:R,padding:22,boxShadow:hov?SHADOW_HOVER:SHADOW,
        transition:'all .2s',transform:hov?'translateY(-2px)':'none',border:`1.5px solid ${C.border}`}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
        <div style={{width:42,height:42,borderRadius:12,background:grad,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 12px ${color}33`}}>
          <Icon name={icon} size={18} color="#fff"/>
        </div>
      </div>
      <div style={{fontSize:36,fontWeight:800,color:C.text,lineHeight:1,marginBottom:4}}>{value}</div>
      <div style={{fontSize:13,color:C.text2,fontWeight:500,marginBottom:8}}>{label}</div>
      {trend&&<div style={{fontSize:11,color,fontWeight:600}}>{trend}</div>}
      {progress!=null&&(
        <div>
          <div style={{height:4,background:bg,borderRadius:999,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${progress}%`,background:GRAD,borderRadius:999,transition:'width 1s ease'}}/>
          </div>
          <div style={{fontSize:11,color,fontWeight:600,marginTop:4}}>{progress}% en progression</div>
        </div>
      )}
    </div>
  );
};

const TaskListScreen = ({tasks,onEdit,onDelete,onStatusChange,onNewTask}) => {
  const [filter,setFilter]=useState('Toutes');
  const [catFilter,setCatFilter]=useState('Toutes');
  const [search,setSearch]=useState('');
  const statuses=['Toutes','À faire','En cours','Terminé','En retard'];

  const filtered=tasks.filter(t=>{
    const matchStatus=filter==='Toutes'||t.status===filter;
    const matchCat=catFilter==='Toutes'||t.cat===catFilter;
    const matchSearch=!search||t.title.toLowerCase().includes(search.toLowerCase())||t.desc.toLowerCase().includes(search.toLowerCase());
    return matchStatus&&matchCat&&matchSearch;
  });

  const count=(s)=>s==='Toutes'?tasks.length:tasks.filter(t=>t.status===s).length;

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:28}}>
        <div>
          <h1 style={{fontSize:28,fontWeight:800,color:C.text,marginBottom:4}}>Mes tâches</h1>
          <p style={{fontSize:14,color:C.text3}}>Gérez votre productivité</p>
        </div>
        <Btn variant="primary" onClick={onNewTask} style={{gap:8,boxShadow:'0 0 20px rgba(16,185,129,0.35)'}}>
          <Icon name="plus" size={16} color="#fff"/> Nouvelle tâche
        </Btn>
      </div>
      {/* Filters */}
      <div style={{background:'#fff',borderRadius:R,padding:'16px 20px',marginBottom:24,boxShadow:SHADOW,border:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {statuses.map(s=>{
            const active=filter===s;
            const cfg=STATUS[s];
            return (
              <button key={s} onClick={()=>setFilter(s)}
                style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:999,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,transition:'all .15s',
                  background:active?(s==='Toutes'?GRAD:(cfg?.bg||C.bg)):C.bg,
                  color:active?(s==='Toutes'?'#fff':(cfg?.color||C.text)):C.text2}}>
                {s}
                <span style={{padding:'1px 6px',borderRadius:999,background:active&&s!=='Toutes'?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.07)',fontSize:10}}>
                  {count(s)}

const StatsScreen = ({tasks}) => {
  const [period,setPeriod]=useState('semaine');

  // ── derived metrics ──
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='Terminé').length;
  const late=tasks.filter(t=>t.status==='En retard').length;
  const inprog=tasks.filter(t=>t.status==='En cours').length;
  const todo=tasks.filter(t=>t.status==='À faire').length;
  const completionRate=Math.round(done/total*100);

  // By category
  const catStats=Object.keys(CATS).map(cat=>{
    const catTasks=tasks.filter(t=>t.cat===cat);
    const catDone=catTasks.filter(t=>t.status==='Terminé').length;
    return {cat,total:catTasks.length,done:catDone,pct:catTasks.length?Math.round(catDone/catTasks.length*100):0};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // Monthly trend (fake but realistic)
  const months=[
    {label:'Nov',done:18,total:24},
    {label:'Déc',done:22,total:28},
    {label:'Jan',done:31,total:36},
    {label:'Fév',done:28,total:33},
    {label:'Mar',done:38,total:42},
    {label:'Avr',done:done+12,total:total+18},
  ];
  const maxMonthVal=Math.max(...months.map(m=>m.total));

  // Weekly heatmap (Mon–Sun × 4 weeks)
  const heatData=[
    [3,5,2,7,4,8,1],
    [6,4,8,3,9,5,2],
    [4,7,5,6,3,9,4],
    [8,5,7,4,6,7,3],
  ];
  const weekDays=['L','M','M','J','V','S','D'];
  const heatMax=9;

  // Status donut segments (SVG)
  const statusData=[
    {label:'Terminé',  value:done,   color:'#10B981'},
    {label:'En cours', value:inprog, color:'#F59E0B'},
    {label:'À faire',  value:todo,   color:'#0EA5E9'},
    {label:'En retard',value:late,   color:'#EF4444'},
  ];
  const donutTotal=statusData.reduce((s,d)=>s+d.value,0)||1;
  let cumAngle=0;
  const donutSegments=statusData.map(seg=>{
    const pct=seg.value/donutTotal;
    const startAngle=cumAngle;
    cumAngle+=pct*360;
    const endAngle=cumAngle;
    const r=70,cx=90,cy=90,stroke=28;
    const a2r=deg=>deg*Math.PI/180;
    const x1=cx+r*Math.sin(a2r(startAngle));
    const y1=cy-r*Math.cos(a2r(startAngle));
    const x2=cx+r*Math.sin(a2r(endAngle));
    const y2=cy-r*Math.cos(a2r(endAngle));
    const largeArc=pct>0.5?1:0;
    const d=seg.value===0?null:
      `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
    return {...seg,d,pct};
  });

  // Top performing days
  const topDays=[
    {day:'Samedi 26 avr.',count:9,bar:100},
    {day:'Jeudi 24 avr.',count:8,bar:89},
    {day:'Lundi 21 avr.',count:8,bar:89},
    {day:'Mercredi 23 avr.',count:6,bar:67},
    {day:'Mardi 22 avr.',count:5,bar:56},
  ];

  const periodBtns=['semaine','mois','année'];

  return (
    <div className="fade-in">
      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:32}}>
        <div>
          <h1 style={{fontSize:28,fontWeight:800,color:C.text,marginBottom:4}}>Statistiques</h1>
          <p style={{fontSize:14,color:C.text3}}>Analysez votre productivité et vos tendances</p>
        </div>
        {/* Period selector */}
        <div style={{display:'flex',gap:4,background:'#fff',borderRadius:12,padding:4,border:`1.5px solid ${C.border}`,boxShadow:SHADOW}}>
          {periodBtns.map(p=>(
            <button key={p} onClick={()=>setPeriod(p)}
              style={{padding:'8px 18px',borderRadius:9,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
                background:period===p?GRAD:'transparent',
                color:period===p?'#fff':C.text2,
                boxShadow:period===p?'0 2px 10px rgba(16,185,129,0.3)':'none',
                transition:'all .2s',textTransform:'capitalize'}}>
              {p.charAt(0).toUpperCase()+p.slice(1)}
            </button>
          ))}
        </div>
      </div>

      {/* KPI strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:16,marginBottom:28}}>
        {[
          {label:'Taux de complétion',value:`${completionRate}%`,sub:'cette période',icon:'check',grad:GRAD,glow:'rgba(16,185,129,0.3)',big:true},
          {label:'Total tâches',value:total,sub:`+3 vs période préc.`,icon:'list',grad:GRAD_ACCENT,glow:'rgba(168,85,247,0.25)'},
          {label:'Terminées',value:done,sub:'✓ excellent',icon:'check',grad:'linear-gradient(135deg,#10B981,#6EE7B7)',glow:'rgba(16,185,129,0.2)'},
          {label:'En retard',value:late,sub:late>0?'à traiter':'aucun retard',icon:'alert',grad:'linear-gradient(135deg,#EF4444,#F87171)',glow:'rgba(239,68,68,0.2)'},
          {label:'Moy./jour',value:'4.2',sub:'tâches complétées',icon:'trend',grad:'linear-gradient(135deg,#06B6D4,#38BDF8)',glow:'rgba(6,182,212,0.25)'},
        ].map((k,i)=>(
          <div key={i} style={{background:'#fff',borderRadius:R,padding:20,boxShadow:SHADOW,border:`1.5px solid ${C.border}`,
            display:'flex',flexDirection:'column',gap:8}}>
            <div style={{width:38,height:38,borderRadius:10,background:k.grad,display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:`0 4px 12px ${k.glow}`}}>
              <Icon name={k.icon} size={16} color="#fff"/>
            </div>
            <div style={{fontSize:k.big?32:28,fontWeight:800,color:C.text,lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:12,color:C.text2,fontWeight:500}}>{k.label}</div>
            <div style={{fontSize:11,color:C.text3}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Row 2: trend chart + donut */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:20,marginBottom:20}}>
        {/* Monthly trend bars */}
        <div style={{background:'#fff',borderRadius:R,padding:28,boxShadow:SHADOW,border:`1.5px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
            <div>
              <h3 style={{fontSize:16,fontWeight:700,color:C.text}}>Évolution mensuelle</h3>
              <p style={{fontSize:12,color:C.text3}}>Tâches créées vs complétées</p>
            </div>
            <div style={{display:'flex',gap:16,fontSize:11,color:C.text3}}>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:3,background:'#D1FAE5',display:'inline-block'}}></span>Créées</span>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:3,background:GRAD,display:'inline-block'}}></span>Terminées</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:12,height:160}}>
            {months.map((m,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                <div style={{width:'100%',display:'flex',gap:3,alignItems:'flex-end',height:140}}>
                  {/* total bar */}
                  <div style={{flex:1,borderRadius:'6px 6px 0 0',background:'#D1FAE5',
                    height:`${Math.round(m.total/maxMonthVal*100)}%`,minHeight:8}}/>
                  {/* done bar */}
                  <div style={{flex:1,borderRadius:'6px 6px 0 0',background:GRAD,
                    height:`${Math.round(m.done/maxMonthVal*100)}%`,minHeight:8,
                    boxShadow:i===5?'0 0 10px rgba(16,185,129,0.4)':'none'}}/>
                </div>
                <span style={{fontSize:10,color:i===5?C.emerald:C.text3,fontWeight:i===5?700:400}}>{m.label}</span>
              </div>
            ))}
          </div>
          {/* Mini stats below */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginTop:20,paddingTop:20,borderTop:`1px solid ${C.border}`}}>
            {[
              {label:'Meilleur mois',value:'Mars 2026',color:C.emerald},
              {label:'Croissance',value:'+28%',color:C.emerald},
              {label:'Tendance',value:'↗ Hausse',color:'#0EA5E9'},
            ].map((s,i)=>(
              <div key={i} style={{textAlign:'center'}}>
                <div style={{fontSize:14,fontWeight:700,color:s.color}}>{s.value}</div>
                <div style={{fontSize:11,color:C.text3}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Status donut */}
        <div style={{background:'#fff',borderRadius:R,padding:24,boxShadow:SHADOW,border:`1.5px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>Répartition statuts</h3>
          <p style={{fontSize:12,color:C.text3,marginBottom:20}}>Distribution des tâches actuelles</p>
          <div style={{display:'flex',justifyContent:'center',marginBottom:20,position:'relative'}}>
            <svg width={180} height={180} viewBox="0 0 180 180">
              {donutSegments.map((seg,i)=>seg.d&&(
                <path key={i} d={seg.d} fill="none" stroke={seg.color} strokeWidth={28}
                  strokeLinecap="butt" style={{transition:'all .3s'}}/>
              ))}
              <text x="90" y="84" textAnchor="middle" fontSize="28" fontWeight="800" fill="#064E3B">{completionRate}%</text>
              <text x="90" y="102" textAnchor="middle" fontSize="11" fill="#9CA3AF">complétées</text>
            </svg>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {statusData.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0,display:'inline-block'}}></span>
                <span style={{fontSize:12,color:C.text2,flex:1,fontWeight:500}}>{s.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:C.text}}>{s.value}</span>
                <span style={{fontSize:11,color:C.text3,width:32,textAlign:'right'}}>{Math.round(s.value/donutTotal*100)}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Row 3: by category + heatmap + top days */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 280px',gap:20}}>
        {/* By category */}
        <div style={{background:'#fff',borderRadius:R,padding:24,boxShadow:SHADOW,border:`1.5px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>Par catégorie</h3>
          <p style={{fontSize:12,color:C.text3,marginBottom:20}}>Avancement par domaine</p>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {catStats.map((s,i)=>{
              const cfg=CATS[s.cat];
              return (
                <div key={i}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{display:'inline-flex',padding:'3px 10px',borderRadius:999,fontSize:11,fontWeight:600,background:cfg.bg,color:cfg.color}}>{s.cat}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
                      <span style={{color:C.text2,fontWeight:500}}>{s.done}/{s.total}</span>
                      <span style={{fontWeight:700,color:s.pct>=70?C.emerald:s.pct>=40?'#F59E0B':'#EF4444'}}>{s.pct}%</span>
                    </div>
                  </div>
                  <div style={{height:8,background:'#F3F4F6',borderRadius:999,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${s.pct}%`,borderRadius:999,
                      background:s.pct>=70?GRAD:s.pct>=40?'linear-gradient(90deg,#F59E0B,#FBBF24)':'linear-gradient(90deg,#EF4444,#F87171)',
                      transition:'width 0.8s ease'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Activity heatmap */}
        <div style={{background:'#fff',borderRadius:R,padding:24,boxShadow:SHADOW,border:`1.5px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>Activité quotidienne</h3>
          <p style={{fontSize:12,color:C.text3,marginBottom:20}}>Tâches complétées par jour (4 semaines)</p>
          {/* Day labels */}
          <div style={{display:'flex',gap:8,marginBottom:8,paddingLeft:48}}>
            {weekDays.map((d,i)=>(
              <div key={i} style={{width:28,textAlign:'center',fontSize:10,color:C.text3,fontWeight:500}}>{d}</div>
            ))}
          </div>
          {heatData.map((week,wi)=>(
            <div key={wi} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:10,color:C.text3,width:40,textAlign:'right',flexShrink:0}}>S{wi+1}</span>
              {week.map((val,di)=>{
                const intensity=val/heatMax;
                const bg=intensity===0?'#F3F4F6':
                  intensity<0.3?'#A7F3D0':
                  intensity<0.6?'#34D399':
                  intensity<0.85?'#10B981':'#059669';
                return (
                  <div key={di} title={`${val} tâches`}
                    style={{width:28,height:28,borderRadius:6,background:bg,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:9,fontWeight:600,color:intensity>0.3?'#fff':'#9CA3AF'}}>
                    {val}
                  </div>
                );
              })}
            </div>
          ))}
          {/* Legend */}
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:16,paddingLeft:48}}>
            <span style={{fontSize:10,color:C.text3}}>Moins</span>
            {['#F3F4F6','#A7F3D0','#34D399','#10B981','#059669'].map((bg,i)=>(
              <div key={i} style={{width:16,height:16,borderRadius:4,background:bg}}/>
            ))}
            <span style={{fontSize:10,color:C.text3}}>Plus</span>
          </div>
        </div>

        {/* Top days */}
        <div style={{background:'#fff',borderRadius:R,padding:24,boxShadow:SHADOW,border:`1.5px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:4}}>Top jours</h3>
          <p style={{fontSize:12,color:C.text3,marginBottom:20}}>Jours les plus productifs</p>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {topDays.map((d,i)=>(
              <div key={i}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:11,color:C.text,fontWeight:500}}>{d.day}</span>
                  <span style={{fontSize:11,fontWeight:700,color:C.emerald}}>{d.count}</span>
                </div>
                <div style={{height:6,background:'#F3F4F6',borderRadius:999,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${d.bar}%`,borderRadius:999,
                    background:i===0?GRAD:`linear-gradient(90deg,${C.mint},${C.teal})`,
                    opacity:1-i*0.12,transition:'width .6s ease'}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:20,padding:14,background:C.bg,borderRadius:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.text2,lineHeight:1.6}}>
              🏆 <strong style={{color:C.emerald}}>Samedi</strong> est votre jour le plus productif en moyenne.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const StaticFormPreview = ({prefilled}) => {
  const statuses=['À faire','En cours','Terminé'];
  const [sel,setSel]=useState(prefilled?'En cours':'À faire');
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>Titre de la tâche</label>
        <input defaultValue={prefilled?'Préparer la présentation Q2':''} placeholder={prefilled?'':'Ex: Préparer la présentation Q2'}
          style={{width:'100%',padding:'12px 14px',border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:14,color:C.text,outline:'none',fontFamily:'Inter'}}/>
      </div>
      <div>
        <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>Description</label>
        <textarea rows={2} defaultValue={prefilled?'Slides pour le board meeting du vendredi.'  :''}
          style={{width:'100%',padding:'12px 14px',border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:14,color:C.text,outline:'none',resize:'none',fontFamily:'Inter'}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div>
          <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>Catégorie</label>
          <select defaultValue={prefilled?'Travail':'Travail'} style={{width:'100%',padding:'11px 14px',border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:13,color:C.text,background:'#fff',outline:'none',fontFamily:'Inter'}}>
            {Object.keys(CATS).map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>Date d'échéance</label>
          <input type="date" defaultValue={prefilled?'2026-04-28':''} style={{width:'100%',padding:'11px 14px',border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:13,color:C.text,outline:'none',fontFamily:'Inter'}}/>
        </div>
      </div>
      <div>
        <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>Statut</label>
        <div style={{display:'flex',gap:8}}>
          {statuses.map(s=>{const active=sel===s;const cfg=STATUS[s];return(
            <button key={s} onClick={()=>setSel(s)} type="button"
              style={{flex:1,padding:'9px',borderRadius:10,border:`2px solid ${active?cfg.color:C.border}`,
                background:active?cfg.bg:'#fff',color:active?cfg.color:C.text3,fontSize:12,fontWeight:600,cursor:'pointer'}}>
              {s}
            </button>
          );})}
        </div>
      </div>
      <div style={{display:'flex',gap:12,marginTop:4}}>
        <div style={{flex:1,padding:'12px',borderRadius:12,border:'1.5px solid #E5E7EB',textAlign:'center',color:C.text2,fontSize:14,fontWeight:600,cursor:'pointer'}}>Annuler</div>
        <div style={{flex:2,padding:'12px',borderRadius:12,background:GRAD,textAlign:'center',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',boxShadow:'0 0 18px rgba(16,185,129,0.3)'}}>
          {prefilled?'Enregistrer les modifications':'Créer la tâche'}
        </div>
      </div>
    </div>
  );
};

// ROOT APP
// ══════════════════════════════
const App = () => {
  const [tasks,setTasks]=useState(INITIAL_TASKS);
  return <ShowcaseScreen tasks={tasks} setTasks={setTasks}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
